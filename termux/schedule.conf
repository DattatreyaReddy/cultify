# Sourced by watcher.sh and setup.sh.

# Time of day (24h, HH:MM) that the booking window opens.
TARGET_TIME="22:00"

# How many minutes after TARGET_TIME the window stays open. index.js retries
# up to MAX_ATTEMPTS times, 15 min apart (one JobScheduler tick per attempt),
# so this must cover that whole span (with jitter margin) for all attempts to
# get a tick: >= (MAX_ATTEMPTS - 1) * 15 + 15.
WINDOW_MINUTES=60
