# Sourced by watcher.sh and setup.sh.

# Time of day (24h, HH:MM) that the booking window opens.
TARGET_TIME="22:00"

# How many minutes after TARGET_TIME the window stays open. Must be >= the
# JobScheduler tick interval registered in setup.sh (default 15 min) so a
# tick is guaranteed to land inside the window.
WINDOW_MINUTES=15
