name: Auto Book Cult Class

on:
  schedule:
    - cron: '32 16 * * *' # 4:32 PM UTC i.e 10:02 PM IST
  workflow_dispatch:

jobs:
  book-class:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        id: setup-bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-version }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-version }}-
            ${{ runner.os }}-bun-
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Run booking script
        env:
          CURL_COMMAND: ${{ secrets.CURL_COMMAND }}
          PREFERRED_CENTER: ${{ secrets.PREFERRED_CENTER }}
          PREFERRED_SLOTS: ${{ secrets.PREFERRED_SLOTS }}
          PREFERRED_WORKOUT: ${{ secrets.PREFERRED_WORKOUT }}
          ENABLE_WAITLIST: ${{ secrets.ENABLE_WAITLIST }}
        run: bun index.js

